name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: pnpm install --frozen-lockfile
      - name: Start Supabase
        run: pnpm db:start
      - name: Apply migrations
        run: pnpm db:reset
      - name: Run pgTAP suite
        run: pnpm db:test
      - name: Generate types and check drift
        run: pnpm db:check-types-drift
      - name: Stop Supabase
        if: always()
        run: pnpm db:stop

  build:
    runs-on: ubuntu-latest
    needs: db
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build

  test:
    runs-on: ubuntu-latest
    needs: db
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: pnpm install --frozen-lockfile
      - name: Start Supabase
        run: pnpm db:start
      - name: Capture anon key for integration tests
        id: supabase-status
        working-directory: packages/db
        run: |
          ANON_KEY=$(supabase status --output env | grep '^ANON_KEY' | cut -d'=' -f2- | tr -d '"')
          echo "anon_key=$ANON_KEY" >> "$GITHUB_OUTPUT"
      - name: Run package tests
        env:
          SUPABASE_ANON_KEY: ${{ steps.supabase-status.outputs.anon_key }}
          SUPABASE_URL: http://127.0.0.1:54321
        run: pnpm test
      - name: Stop Supabase
        if: always()
        run: pnpm db:stop
