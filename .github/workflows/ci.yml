name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel in-progress CI runs on re-pushed branches so we don't double-spend runners
# and race the same TIGER cache key.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Non-deploying workflow — least-privilege token.
permissions:
  contents: read

jobs:
  # Slice 63 (audit C40): the 3 jobs run fully in parallel — none consumes
  # another's output (build uses placeholder env, test boots its own Supabase
  # and re-seeds TIGER). Accepted trade-off: on a COLD TIGER cache both db and
  # test fall back to restore-keys and re-download shapefiles concurrently;
  # warm-cache runs (the norm since slice 55) are unaffected.
  # The TIGER cache save key is suffixed with ${{ github.job }} (…-db / …-test):
  # db and test ran in parallel writing the SAME run-scoped key and raced
  # ("Unable to reserve cache … another job may be creating this cache"), so
  # neither saved and master never warmed. Per-job keys let both save; both
  # still restore the newest via the shared `tiger-2024-v1-` prefix.
  # supabase/setup-cli is pinned (audit C43/U13): `latest` caused a documented
  # indefinite hang (Gotcha #30) and let CLI releases drift the Postgres under
  # pgTAP between runs of the same commit. Bump deliberately in dedicated
  # commits; keep in sync with the local CLI.
  db:
    runs-on: ubuntu-latest
    # 45m (was 30): a COLD TIGER seed (no restorable cache — Actions caches are
    # branch-scoped, so master can't see feature-branch caches) does a full
    # ~150-shapefile Census download that ran right up to the old 30m cap and
    # got killed mid-seed (a timeout surfaces as a "cancelled" job). 45m lets a
    # cold seed finish so it can SAVE a cache; warm runs still finish in ~10m.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: supabase/setup-cli@v2
        with:
          version: 2.98.1
      - run: pnpm install --frozen-lockfile
      - name: Start Supabase
        run: pnpm db:start
      - name: Apply migrations
        run: pnpm db:reset
      - name: Capture service role key for fixture ingest
        # The issue-catalog fixture suite ingests via the Supabase JS client
        # (PostgREST .from().upsert()), so it needs the API URL + service-role
        # key rather than the SUPABASE_DB_URL the pg.Client suites use. Mirrors
        # the `test` job's supabase-status capture.
        id: supabase-status
        working-directory: packages/db
        run: |
          SERVICE_ROLE_KEY=$(supabase status --output env | grep '^SERVICE_ROLE_KEY' | cut -d'=' -f2- | tr -d '"')
          echo "::add-mask::$SERVICE_ROLE_KEY"
          echo "service_role_key=$SERVICE_ROLE_KEY" >> "$GITHUB_OUTPUT"
      - name: Issue catalog fixture ingest
        run: pnpm --filter @chiaro/db test ingest.integration
        env:
          SUPABASE_URL: http://127.0.0.1:54321
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase-status.outputs.service_role_key }}
      - name: Restore TIGER cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/tiger
          key: tiger-2024-v1-${{ github.run_id }}-${{ github.job }}
          restore-keys: |
            tiger-2024-v1-
      - name: Seed districts (TIGER 2024)
        run: pnpm --filter @chiaro/db db:seed-tiger
        env:
          SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      - name: Save TIGER cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/tiger
          key: tiger-2024-v1-${{ github.run_id }}-${{ github.job }}
      - name: Run state-officials ingest (fixture mode)
        run: pnpm seed:state-officials --fixture-mode
        env:
          SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      - name: Verify state-leg district format
        # Slice 27 audit Section 5: CI never asserted producer/consumer
        # alignment between TIGER-side district codes and state-leg-config's
        # consumer expectations. Diagnostic exits non-zero if any state_senate
        # or state_house code drifts from the canonical ${STATE}-S{S,H}-${num}
        # format. Runs against districts only — does not require
        # state-officials-ingest to have populated officials first.
        run: pnpm --filter @chiaro/db diagnose:state-leg-district-format
        env:
          SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      - name: Run pgTAP suite
        run: pnpm db:test
      - name: Smoke officials ingest (against fixtures)
        run: pnpm --filter @chiaro/db test supabase/seed/officials-ingest.test.ts
        env:
          SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      - name: Smoke slice-4 ingest pipelines (against fixtures)
        run: |
          pnpm --filter @chiaro/db test supabase/seed/unitedstates-legislators-ingest.test.ts
          pnpm --filter @chiaro/db test supabase/seed/bills-votes-ingest.test.ts
          pnpm --filter @chiaro/db test supabase/seed/scorecards/index.test.ts
          pnpm --filter @chiaro/db test supabase/seed/finance-ingest.test.ts
          pnpm --filter @chiaro/db test supabase/seed/salary-residency-ingest.test.ts
          pnpm --filter @chiaro/db test supabase/seed/town-halls-ingest.test.ts
          pnpm --filter @chiaro/db test supabase/seed/stock-watcher-ingest.test.ts
          pnpm --filter @chiaro/db test supabase/seed/recompute-metrics.test.ts
        env:
          SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      - name: Generate types and check drift
        run: pnpm db:check-types-drift
      - name: Stop Supabase
        if: always()
        run: pnpm db:stop

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # next build collects page data for routes that import the Supabase client
    # wrapper, which throws on missing env. The values don't need to point at a
    # real instance — build never connects. Placeholder is fine.
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_ci_placeholder
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      NEXT_PUBLIC_SENTRY_DSN_WEB: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN_WEB }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache turbo
        uses: actions/cache@v5
        with:
          path: |
            .turbo
            apps/*/.turbo
            packages/*/.turbo
          key: turbo-build-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-build-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-
            turbo-build-${{ runner.os }}-
      - name: Cache Next.js compiler cache
        # turbo.json deliberately excludes .next/cache from task outputs;
        # nothing else persisted it, so every CI build was cold (audit C40).
        uses: actions/cache@v5
        with:
          path: apps/web/.next/cache
          key: nextcache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nextcache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
      - run: pnpm typecheck
      - run: pnpm build

  # Slice 63 (audit C40): the former standalone `functions` job (~3.3
  # runner-minutes of checkout+install+Supabase boot wrapping a single deno
  # test step) is folded into `test` below, which already boots Supabase and
  # serves the same Edge Function.
  test:
    runs-on: ubuntu-latest
    # 50m (was 30): same cold-TIGER-seed headroom as `db`, plus this job also
    # runs the full workspace + live integration suites after seeding.
    timeout-minutes: 50
    env:
      GEOCODIO_KEY: ${{ secrets.GEOCODIO_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: supabase/setup-cli@v2
        with:
          version: 2.98.1
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v1.x
      - name: Verify no legacy CLI guard patterns
        # Slice 30 task 3: fast-fail if either of the 2 known-bad CLI guard
        # patterns reappear in seed/. Catches future regressions cheaply
        # before vitest spins up. Canonical fix is isCliEntry() from
        # packages/db/supabase/seed/shared/cli.ts.
        run: |
          set -e
          if grep -rn 'file://\${process\.argv\[1\]' packages/db/supabase/seed/ --exclude=cli.ts; then
            echo "::error::Found broken 2-slash file:// CLI guard. Use isCliEntry() from shared/cli.ts."
            exit 1
          fi
          if grep -rn 'fileURLToPath(import.meta.url) === process.argv\[1\]' packages/db/supabase/seed/ --exclude=cli.ts; then
            echo "::error::Found legacy fileURLToPath CLI guard. Use isCliEntry() from shared/cli.ts."
            exit 1
          fi
      - run: pnpm install --frozen-lockfile
      - name: Cache turbo
        uses: actions/cache@v5
        with:
          path: |
            .turbo
            apps/*/.turbo
            packages/*/.turbo
          key: turbo-test-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-test-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-
            turbo-test-${{ runner.os }}-
      - name: Start Supabase
        run: pnpm db:start
      - name: Restore TIGER cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/tiger
          key: tiger-2024-v1-${{ github.run_id }}-${{ github.job }}
          restore-keys: |
            tiger-2024-v1-
      - name: Seed TIGER
        run: pnpm --filter @chiaro/db db:seed-tiger
        env:
          SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      - name: Save TIGER cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/tiger
          key: tiger-2024-v1-${{ github.run_id }}-${{ github.job }}
      - name: Capture anon key + service role key for integration tests
        id: supabase-status
        working-directory: packages/db
        run: |
          ANON_KEY=$(supabase status --output env | grep '^ANON_KEY' | cut -d'=' -f2- | tr -d '"')
          SERVICE_ROLE_KEY=$(supabase status --output env | grep '^SERVICE_ROLE_KEY' | cut -d'=' -f2- | tr -d '"')
          echo "anon_key=$ANON_KEY" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$SERVICE_ROLE_KEY"
          echo "service_role_key=$SERVICE_ROLE_KEY" >> "$GITHUB_OUTPUT"
      - name: Serve Edge Function
        working-directory: packages/db
        run: |
          # supabase functions serve only forwards env to the Deno worker via
          # --env-file, NOT the parent process env. Materialize a one-line file.
          printf 'GEOCODIO_KEY=%s\n' "$GEOCODIO_KEY" > /tmp/edge-env.env
          supabase functions serve calibrate-location --env-file /tmp/edge-env.env &
          sleep 5
        env:
          GEOCODIO_KEY: ${{ secrets.GEOCODIO_KEY }}
      - name: Deno tests (Edge Function)
        # NOTE: deno test discovers files under cwd only — functions/_shared/
        # sentry.test.ts is a sibling dir and has NEVER run in CI (pre-existing
        # gap discovered in slice 63 review; the old `functions` job had the
        # same cwd). Enabling it is a follow-up — verify it passes before
        # adding `../_shared` here.
        working-directory: packages/db/supabase/functions/calibrate-location
        run: deno test --allow-net --allow-env
      - name: Run package tests
        # Runs all workspace tests through turbo, including @chiaro/officials
        # integration tests which read SUPABASE_*_KEY for the ephemeral local
        # Supabase started above. turbo.json's `^test` dependency serializes
        # so officials runs after db (no shared-DB race).
        env:
          SUPABASE_ANON_KEY: ${{ steps.supabase-status.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase-status.outputs.service_role_key }}
          SUPABASE_URL: http://127.0.0.1:54321
          # GEOCODIO_KEY gates the live-GeocodIO describe in @chiaro/location;
          # it is declared in turbo.json test.env so strict mode passes it
          # through to vitest. OPENSECRETS/OPENFEC were dead here — turbo
          # stripped them and no vitest test reads them (audit C39).
          GEOCODIO_KEY: ${{ secrets.GEOCODIO_KEY }}
        run: pnpm test
      - name: Stop Supabase
        if: always()
        run: pnpm db:stop
