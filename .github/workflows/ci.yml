name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: pnpm install --frozen-lockfile
      - name: Start Supabase
        run: pnpm db:start
      - name: Apply migrations
        run: pnpm db:reset
      - name: Cache TIGER 2024 download
        uses: actions/cache@v4
        with:
          path: ~/.cache/tiger
          key: tiger-2024-v1
      - name: Seed districts (TIGER 2024)
        run: pnpm --filter @chiaro/db db:seed-tiger
        env:
          SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      - name: Run pgTAP suite
        run: pnpm db:test
      - name: Generate types and check drift
        run: pnpm db:check-types-drift
      - name: Stop Supabase
        if: always()
        run: pnpm db:stop

  build:
    runs-on: ubuntu-latest
    needs: db
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build

  functions:
    runs-on: ubuntu-latest
    needs: db
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Boot Supabase
        run: pnpm db:start
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      - name: Deno tests
        working-directory: packages/db/supabase/functions/calibrate-location
        run: deno test --allow-net --allow-env
      - name: Stop Supabase
        if: always()
        run: pnpm db:stop

  test:
    runs-on: ubuntu-latest
    needs: [db, functions]
    env:
      GEOCODIO_KEY: ${{ secrets.GEOCODIO_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: pnpm install --frozen-lockfile
      - name: Start Supabase
        run: pnpm db:start
      - name: Seed TIGER
        run: pnpm --filter @chiaro/db db:seed-tiger
        env:
          SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      - name: Capture anon key for integration tests
        id: supabase-status
        working-directory: packages/db
        run: |
          ANON_KEY=$(supabase status --output env | grep '^ANON_KEY' | cut -d'=' -f2- | tr -d '"')
          echo "anon_key=$ANON_KEY" >> "$GITHUB_OUTPUT"
      - name: Serve Edge Function
        working-directory: packages/db
        run: |
          supabase functions serve calibrate-location &
          sleep 5
        env:
          GEOCODIO_KEY: ${{ secrets.GEOCODIO_KEY }}
      - name: Run package tests
        env:
          SUPABASE_ANON_KEY: ${{ steps.supabase-status.outputs.anon_key }}
          SUPABASE_URL: http://127.0.0.1:54321
          GEOCODIO_KEY: ${{ secrets.GEOCODIO_KEY }}
        run: pnpm test
      - name: Stop Supabase
        if: always()
        run: pnpm db:stop
