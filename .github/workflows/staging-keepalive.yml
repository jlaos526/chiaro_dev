# Slice 79.5 (roadmap revision 2026-07-12): Supabase free tier pauses a project
# after ~7 days without database activity — the top demo-killing failure for a
# portfolio link (reviewer clicks, DB is asleep, every page errors). This cron
# issues one authenticated PostgREST read every 3 days, which counts as
# activity and keeps chiaro-staging awake.
#
# Notes:
# - The anon key is public-by-design (it ships in the web bundle); it lives in
#   a repo secret anyway to keep the workflow file environment-agnostic.
# - GitHub disables scheduled workflows after 60 days of repo inactivity — if
#   this repo idles that long, re-enable it from the Actions tab (or any push
#   re-arms it). S81's ingest scheduler is the durable replacement.
# - issue_topics is a public-read catalog table (migration 0057), so the query
#   succeeds anonymously; even an RLS-empty response still registers activity.
name: staging-keepalive

on:
  schedule:
    - cron: '17 6 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping staging PostgREST
        run: |
          code=$(curl -s -o /tmp/body -w '%{http_code}' \
            "$STAGING_SUPABASE_URL/rest/v1/issue_topics?select=slug&limit=1" \
            -H "apikey: $STAGING_SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $STAGING_SUPABASE_ANON_KEY")
          echo "HTTP $code"
          cat /tmp/body
          # 2xx = awake; anything else fails the job so the failure email is
          # the "staging is paused/broken" alert.
          [ "$code" -ge 200 ] && [ "$code" -lt 300 ]
        env:
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
