# Slice 81 (audit C34): data freshness was un-operationalized — 27+ one-shot
# seed CLIs, zero scheduler, zero runbook. This weekly cron refreshes the
# key-free / key-in-hand sources against STAGING and persists each step's log
# as a 30-day artifact (the C34 "persisted skip telemetry"); a failed step
# fails the job, so the GitHub failure email is the alerting consumer.
#
# Decisions (recorded per the 2026-07-12 roadmap revision):
# - WHERE cron runs: GitHub Actions (the only always-on runner we have; free
#   on public repos). Fork PRs never receive secrets, and secrets are masked
#   in public logs.
# - CREDENTIAL CUSTODY: STAGING_SUPABASE_DB_URL (session-pooler connection
#   string incl. the DB password) + CONGRESS_GOV_API_KEY live as repo
#   secrets; the same values live in packages/db/.env (gitignored) for local
#   runs. Rotate by updating both.
# - SCOPE v1 (key-free or key-in-hand only): federal officials, state
#   legislators (openstates/people YAML clone — no API key), Mobilize town
#   halls (no auth), federal bills/votes + metrics stay OUT (bills-votes is
#   long + rate-limited; revisit). Flag-requiring steps (committees, finance,
#   scorecards, state metrics) and steps needing keys we don't hold
#   (OPENSTATES_API_KEY for v3 bills) remain manual per CLAUDE.md.
# - This durably complements the S79.5 staging-keepalive cron (which stays —
#   cheaper and 2×/week vs weekly).
# - GitHub disables crons after 60 days of repo inactivity; any push re-arms.
name: scheduled-ingest

on:
  schedule:
    - cron: '17 6 * * 0'
  workflow_dispatch:

concurrency:
  group: scheduled-ingest
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SUPABASE_DB_URL: ${{ secrets.STAGING_SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: mkdir -p ingest-logs

      - name: Federal officials (Congress.gov)
        env:
          CONGRESS_GOV_API_KEY: ${{ secrets.CONGRESS_GOV_API_KEY }}
        run: pnpm seed:officials 2>&1 | tee ingest-logs/federal-officials.log

      - name: State legislators (openstates/people YAML)
        run: |
          git clone --depth 1 https://github.com/openstates/people.git /tmp/openstates-people
          mkdir -p /tmp/people-flat
          cp /tmp/openstates-people/data/*/legislature/*.yml /tmp/people-flat/
          echo "flattened $(ls /tmp/people-flat | wc -l) person YAMLs"
          OPENSTATES_DATA_DIR=/tmp/people-flat pnpm seed:state-officials 2>&1 | tee ingest-logs/state-officials.log

      - name: Town halls (Mobilize, federal + state)
        run: |
          pnpm seed:federal-town-halls-mobilize 2>&1 | tee ingest-logs/federal-town-halls.log
          pnpm seed:state-community --component=halls --instrument 2>&1 | tee ingest-logs/state-town-halls.log

      - name: Persist ingest logs (C34 skip telemetry)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingest-logs-${{ github.run_id }}
          path: ingest-logs/
          retention-days: 30
